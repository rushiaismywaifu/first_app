name: Build & Release APK

on:
  push:
    branches: [ "main", "arena/*" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      create_release:
        description: '立即建立或更新 GitHub Release 並上傳 APK？'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      release_tag:
        description: 'Release 標籤名稱 (例如: v1.0.0)'
        required: false
        default: 'v1.0.2'
        type: string

jobs:
  build:
    name: Build & Release Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup verified release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$STORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "::error::Release signing secrets are required. Debug signing is not permitted."
            exit 1
          fi
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > app/release.jks
          chmod 600 app/release.jks
          keytool -list -keystore app/release.jks -storepass "$STORE_PASSWORD" -alias "$KEY_ALIAS" >/dev/null
          echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/app/release.jks" >> "$GITHUB_ENV"
          echo "STORE_PASSWORD=$STORE_PASSWORD" >> "$GITHUB_ENV"
          echo "KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
          echo "KEY_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK with ProGuard & R8
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK for clarity
        run: |
          TAG_NAME="${{ github.event.inputs.release_tag || 'v1.0.2' }}"
          if [[ "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
          fi
          echo "📦 Tag detected: ${TAG_NAME}"
          SRC_APK="app/build/outputs/apk/release/app-release.apk"
          DEST_APK="app/build/outputs/apk/release/WebhookSender-${TAG_NAME}-release.apk"
          if [ -f "$SRC_APK" ]; then
            mv "$SRC_APK" "$DEST_APK"
            echo "✅ Renamed APK to $DEST_APK"
            echo "APK_PATH=$DEST_APK" >> "$GITHUB_ENV"
          else
            echo "::error::APK not found at $SRC_APK"
            ls -R app/build/outputs/
            exit 1
          fi

      - name: Upload APK as GitHub Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebhookSender-Release-APK
          path: app/build/outputs/apk/release/WebhookSender-*-release.apk
          if-no-files-found: error

      - name: Publish or Update GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event.inputs.create_release == 'true' || github.ref == 'refs/heads/main' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ github.event.inputs.release_tag || 'v1.0.2' }}"
          if [[ "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
          fi

          APK_FILE=$(ls app/build/outputs/apk/release/WebhookSender-*-release.apk | head -n1)
          echo "🚀 嘗試上傳 APK 至 Release: ${TAG_NAME} (file: $APK_FILE)"

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            echo "✅ Release ${TAG_NAME} 已存在，正在上傳或更新 APK 檔案..."
            gh release upload "${TAG_NAME}" "$APK_FILE" --clobber
          else
            echo "ℹ️ Release ${TAG_NAME} 尚未建立，正在自動建立 Release 並上傳 APK..."
            gh release create "${TAG_NAME}" "$APK_FILE"               --title "🪝 Webhook Sender ${TAG_NAME}"               --notes "## 🪝 Webhook Sender Android App Release (${TAG_NAME})

          本版本由 GitHub Actions 自動編譯與打包，並啟用 ProGuard/R8 最佳化與 APK 簽名，v2+v3 雙簽章。

          ### 📥 安裝方式
          1. 點擊下方下載 APK (檔名含版本號 ${TAG_NAME})
          2. 於 Android 設備上點擊安裝（若出現「安裝未知來源應用程式」提示，請至手機設定中授權允許即可）

          ### ⚠️ 重要升級說明 (F-10)
          - 若您已安裝 **v1.0.0 (debug 簽章版)**，因簽章金鑰已更換為正式 release keystore，無法就地升級，會顯示 INSTALL_FAILED_UPDATE_INCOMPATIBLE。
          - 請先**解除安裝 v1.0.0**，再安裝本版本 (v1.0.2)。
          - v1.0.1 與之後版本使用相同 release keystore，可正常就地升級。

          ### 🔐 本版安全強化 (F-05 ~ F-13)
          - 新增憑證綁定 (Certificate Pinning) 防止中間人攻擊
          - Webhook URL 輸入框改為密碼遮罩模式 (password_toggle)
          - 啟用 APK Signature Scheme v3 支援金鑰輪替
          - 修正 versionCode/versionName 與 tag 一致性，APK 檔名動態化
          - ProfileInstallReceiver exported 設為 false
          - 剪貼簿貼上增加 URL 白名單驗證

          ### 🛡️ MASVS 合規
          - 已通過 OWASP MASVS-L1 大部分檢查，僅憑證綁定為縱深防禦已於此版完成
          " || echo "⚠️ 注意: 如果建立 Release 失敗，請至 Settings -> Actions -> General 確認 Workflow permissions 已勾選 'Read and write permissions'。"
          fi
