name: Build & Release APK

on:
  push:
    branches: [ "main", "arena/*" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      create_release:
        description: '立即建立或更新 GitHub Release 並上傳 APK？'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      release_tag:
        description: 'Release 標籤名稱 (例如: v1.0.0)'
        required: false
        default: 'v1.0.0'
        type: string

jobs:
  build:
    name: Build & Release Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup verified release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ] || [ -z "$STORE_PASSWORD" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASSWORD" ]; then
            echo "::error::Release signing secrets are required. Debug signing is not permitted."
            exit 1
          fi
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > app/release.jks
          chmod 600 app/release.jks
          keytool -list -keystore app/release.jks -storepass "$STORE_PASSWORD" -alias "$KEY_ALIAS" >/dev/null
          echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/app/release.jks" >> "$GITHUB_ENV"
          echo "STORE_PASSWORD=$STORE_PASSWORD" >> "$GITHUB_ENV"
          echo "KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
          echo "KEY_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK with ProGuard & R8
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK for clarity
        run: |
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/WebhookSender-v1.0.0-release.apk

      - name: Upload APK as GitHub Workflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebhookSender-Release-APK
          path: app/build/outputs/apk/release/WebhookSender-v1.0.0-release.apk
          if-no-files-found: error

      - name: Publish or Update GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event.inputs.create_release == 'true' || github.ref == 'refs/heads/main' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ github.event.inputs.release_tag || 'v1.0.0' }}"
          if [[ "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
          fi

          echo "🚀 嘗試上傳 APK 至 Release: ${TAG_NAME}"
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            echo "✅ Release ${TAG_NAME} 已存在，正在上傳或更新 APK 檔案..."
            gh release upload "${TAG_NAME}" app/build/outputs/apk/release/WebhookSender-v1.0.0-release.apk --clobber
          else
            echo "ℹ️ Release ${TAG_NAME} 尚未建立，正在自動建立 Release 並上傳 APK..."
            gh release create "${TAG_NAME}" app/build/outputs/apk/release/WebhookSender-v1.0.0-release.apk \
              --title "🪝 Webhook Sender ${TAG_NAME}" \
              --notes "## 🪝 Webhook Sender Android App Release (${TAG_NAME})

              本版本由 GitHub Actions 自動編譯與打包，並啟用 ProGuard/R8 最佳化與 APK 簽名。
              
              ### 📥 安裝方式
              1. 點擊下方下載 \`WebhookSender-v1.0.0-release.apk\`
              2. 於 Android 設備上點擊安裝（若出現「安裝未知來源應用程式」提示，請至手機設定中授權允許即可）" || echo "⚠️ 注意: 如果建立 Release 失敗，請至 Settings -> Actions -> General 確認 Workflow permissions 已勾選 'Read and write permissions'。"
          fi
